<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q5 Method </title>
</head>
<body>
    <p class="para">  </p>

    <script>
        let p = document.getElementsByClassName("para");
        p[0].innerText = "hello";

        // getElementsByClassName returns all elements with that class
        // We access the first one using [0] to change its text
        
    </script>

</body>
</html>
